name: Vibeshot Static Compliance & Verification CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install --frozen-lockfile

      - name: Run Static TypeScript Verification
        run: bun run typecheck

      - name: Run ESLint & Format Compliance Checks
        run: bun run lint
